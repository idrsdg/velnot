<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1200px; height: 630px; overflow: hidden; background: #0c0a08;
         font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .bg {
    width: 100%; height: 100%;
    background: radial-gradient(ellipse at 20% 50%, rgba(249,115,22,0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 50%, rgba(236,72,153,0.1) 0%, transparent 60%),
                #0c0a08;
    display: flex; align-items: center; padding: 80px;
    position: relative; overflow: hidden;
  }
  .grid {
    position: absolute; inset: 0;
    background-image: linear-gradient(rgba(249,115,22,0.04) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(249,115,22,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  .left { flex: 1; z-index: 1; }
  .badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(249,115,22,0.12); border: 1px solid rgba(249,115,22,0.3);
    color: #f97316; padding: 6px 16px; border-radius: 20px;
    font-size: 14px; font-weight: 600; margin-bottom: 28px;
  }
  h1 {
    font-size: 64px; font-weight: 800; line-height: 1.1;
    color: #f5f0eb; margin-bottom: 20px;
  }
  h1 span { background: linear-gradient(135deg, #f97316, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  p { font-size: 22px; color: #8a7a6a; line-height: 1.5; max-width: 520px; }
  .right { z-index: 1; margin-left: 60px; }
  .card {
    background: #1a1410; border: 1px solid #2a1e14; border-radius: 20px;
    padding: 28px; width: 300px;
  }
  .card-title { font-size: 13px; color: #6a5040; font-weight: 600; margin-bottom: 16px; letter-spacing: 0.06em; text-transform: uppercase; }
  .stat { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .stat-label { font-size: 14px; color: #8a7a6a; }
  .stat-val { font-size: 14px; font-weight: 700; color: #f97316; }
  .divider { height: 1px; background: #2a1e14; margin: 16px 0; }
  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.25);
    color: #10b981; padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 600;
  }
  .logo { position: absolute; bottom: 40px; left: 80px; display: flex; align-items: center; gap: 12px; z-index: 1; }
  .logo-icon { font-size: 28px; }
  .logo-text { font-size: 22px; font-weight: 800; color: #f5f0eb; }
  .logo-url { font-size: 14px; color: #4a3a2a; margin-left: 4px; }
</style>
</head>
<body>
<div class="bg">
  <div class="grid"></div>
  <div class="left">
    <div class="badge">🎙 No bot joins your call</div>
    <h1>Record meetings.<br><span>Silently.</span></h1>
    <p>Auto-transcription + AI summary.<br>Works with Zoom, Teams, Meet & more.</p>
  </div>
  <div class="right">
    <div class="card">
      <div class="card-title">Meeting Summary</div>
      <div class="stat"><span class="stat-label">Duration</span><span class="stat-val">47 min</span></div>
      <div class="stat"><span class="stat-label">Speakers</span><span class="stat-val">4</span></div>
      <div class="stat"><span class="stat-label">Action items</span><span class="stat-val">6</span></div>
      <div class="divider"></div>
      <div class="pill">✓ Transcribed & Summarized</div>
    </div>
  </div>
  <div class="logo">
    <span class="logo-icon">🎙</span>
    <span class="logo-text">Velnot</span>
    <span class="logo-url">velnot.com</span>
  </div>
</div>
</body>
</html>
